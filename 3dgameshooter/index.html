<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Third Person Shooter</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; color: #fff; }
  #hud { position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; padding: 12px; box-sizing: border-box; }
  #hud .row { display: flex; justify-content: space-between; align-items: center; }
  .stat { background: rgba(0,0,0,0.5); padding: 8px 14px; border-radius: 6px; font-size: 16px; }
  #healthbar { width: 220px; height: 16px; background: #333; border-radius: 8px; overflow: hidden; margin-top: 6px; }
  #healthfill { height: 100%; width: 100%; background: linear-gradient(90deg,#e22,#f55); transition: width 0.2s; }
  #crosshair { position: fixed; top: 50%; left: 50%; width: 18px; height: 18px; transform: translate(-50%,-50%); pointer-events: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
  #crosshair::before { left: 8px; top: 0; width: 2px; height: 18px; }
  #crosshair::after { top: 8px; left: 0; height: 2px; width: 18px; }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  #overlay h1 { font-size: 42px; margin: 0 0 10px; }
  #overlay p { font-size: 18px; margin: 6px 0; max-width: 540px; line-height: 1.5; }
  #overlay button { margin-top: 18px; padding: 12px 28px; font-size: 18px; border: none; border-radius: 8px; background: #2a7; color: #fff; cursor: pointer; }
  #overlay button:hover { background: #39b885; }
  .hidden { display: none !important; }
  .key { display: inline-block; background:#222; border:1px solid #555; border-radius:4px; padding:2px 8px; margin:0 2px; font-family: monospace; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 6px; opacity: 0; transition: opacity 0.3s; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="hud">
  <div class="row">
    <div>
      <div class="stat">Score: <span id="score">0</span></div>
      <div class="stat">Wave: <span id="wave">1</span></div>
    </div>
    <div>
      <div class="stat">Health</div>
      <div id="healthbar"><div id="healthfill"></div></div>
      <div class="stat" style="margin-top:6px;">Ammo: <span id="ammo">12</span> / <span id="reserves">48</span></div>
    </div>
  </div>
</div>
<div id="crosshair"></div>
<div id="toast"></div>

<div id="overlay">
  <h1>Third Person Shooter</h1>
  <p>Move with <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> · Aim/turn with <span class="key">Mouse</span> · Shoot with <span class="key">Left Click</span> · Reload with <span class="key">R</span> · Sprint with <span class="key">Shift</span> · Jump <span class="key">Space</span></p>
  <p>Survive the waves of enemies. Click the button to lock your mouse and play.</p>
  <button id="startBtn">Play</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ---------- Globals ----------
let scene, camera, renderer, clock;
let player, playerBody, playerHand;
let enemies = [], bullets = [], particles = [];
let pickups = [];
const keys = {};
const mouse = { x: 0, y: 0, locked: false, down: false };
let yaw = 0, pitch = -0.15;
let playerVelocity = new THREE.Vector3();
let playerOnGround = true;
let gameState = 'menu'; // menu, playing, dead
let score = 0, wave = 1, waveTimer = 0;
let ammo = 12, reserves = 48, magSize = 12, reloading = false, reloadTimer = 0;
let health = 100, maxHealth = 100;
let lastShot = 0, fireRate = 0.12;
let enemiesToSpawn = 0, spawnTimer = 0, betweenWaves = false, waveBreakTimer = 0;
let muzzleFlash, muzzleTimer = 0;

const GRAVITY = 22;
const PLAYER_SPEED = 7;
const SPRINT_SPEED = 12;
const JUMP_V = 8;

// ---------- Setup ----------
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x88aacc);
  scene.fog = new THREE.Fog(0x88aacc, 40, 120);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 500);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // Lights
  const hemi = new THREE.HemisphereLight(0xffffff, 0x444466, 0.7);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xffffff, 1.1);
  sun.position.set(40, 60, 20);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  const d = 60;
  sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
  sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
  sun.shadow.camera.far = 200;
  scene.add(sun);

  // Ground
  const groundGeo = new THREE.PlaneGeometry(200, 200);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a7a3a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid for visual depth
  const grid = new THREE.GridHelper(200, 100, 0x335533, 0x336633);
  grid.position.y = 0.01;
  scene.add(grid);

  // Boundary walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x886644 });
  const arena = 70;
  const wallH = 6;
  const walls = [
    [0, 0, -arena, arena*2, wallH, 1],
    [0, 0,  arena, arena*2, wallH, 1],
    [-arena, 0, 0, 1, wallH, arena*2],
    [ arena, 0, 0, 1, wallH, arena*2],
  ];
  for (const [x,y,z,w,h,d2] of walls) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d2), wallMat);
    m.position.set(x, h/2, z);
    m.castShadow = true; m.receiveShadow = true;
    scene.add(m);
  }

  // Obstacles
  const crateMat = new THREE.MeshStandardMaterial({ color: 0x8b6332 });
  const obstaclePositions = [
    [-15, 0, -10], [20, 0, -20], [30, 0, 10], [-25, 0, 15],
    [5, 0, 25], [-35, 0, -25], [25, 0, 30], [10, 0, -30]
  ];
  for (const p of obstaclePositions) {
    const s = 2 + Math.random()*2;
    const crate = new THREE.Mesh(new THREE.BoxGeometry(s, s, s), crateMat);
    crate.position.set(p[0], s/2, p[2]);
    crate.castShadow = true; crate.receiveShadow = true;
    crate.userData.solid = true;
    scene.add(crate);
  }

  // Player
  player = new THREE.Group();
  player.position.set(0, 0, 0);
  scene.add(player);

  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3366cc });
  playerBody = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.0, 6, 12), bodyMat);
  playerBody.position.y = 1.0;
  playerBody.castShadow = true;
  player.add(playerBody);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 16), new THREE.MeshStandardMaterial({ color: 0xf2c79a }));
  head.position.y = 1.85;
  head.castShadow = true;
  player.add(head);

  // Gun
  playerHand = new THREE.Group();
  const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const gun = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 1.0), gunMat);
  gun.position.set(0, 0, 0.4);
  gun.castShadow = true;
  playerHand.add(gun);
  const grip = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.4, 0.18), gunMat);
  grip.position.set(0, -0.25, 0.1);
  playerHand.add(grip);
  muzzleFlash = new THREE.PointLight(0xffaa44, 0, 6);
  muzzleFlash.position.set(0, 0, 1.0);
  playerHand.add(muzzleFlash);
  const flashMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffdd66, transparent: true, opacity: 0 })
  );
  flashMesh.position.set(0, 0, 1.0);
  flashMesh.name = 'flashMesh';
  playerHand.add(flashMesh);

  playerHand.position.set(0.45, 1.2, 0.2);
  player.add(playerHand);

  // Events
  window.addEventListener('resize', onResize);
  document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'KeyR') reload(); });
  document.addEventListener('keyup', e => { keys[e.code] = false; });
  document.addEventListener('mousemove', e => {
    if (!mouse.locked || gameState !== 'playing') return;
    yaw -= e.movementX * 0.0025;
    pitch -= e.movementY * 0.0025;
    pitch = Math.max(-0.9, Math.min(0.4, pitch));
  });
  document.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
  document.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
  document.addEventListener('pointerlockchange', () => {
    mouse.locked = document.pointerLockElement === renderer.domElement;
  });

  document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('overlay').classList.add('hidden');
    gameState = 'playing';
    renderer.domElement.requestPointerLock();
    startWave();
  });

  animate();
}

function onResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ---------- Waves ----------
function startWave() {
  betweenWaves = false;
  enemiesToSpawn = 4 + wave * 2;
  spawnTimer = 0;
  showToast(`Wave ${wave} incoming!`);
}

function endWave() {
  betweenWaves = true;
  waveBreakTimer = 4;
  showToast(`Wave ${wave} cleared! Next in 4s`);
  // Heal a bit and restock
  health = Math.min(maxHealth, health + 25);
  reserves += 24;
  updateHUD();
}

function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2000);
}

// ---------- Enemies ----------
function spawnEnemy() {
  const enemy = new THREE.Group();
  const angle = Math.random() * Math.PI * 2;
  const dist = 30 + Math.random() * 25;
  enemy.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);

  const mat = new THREE.MeshStandardMaterial({ color: 0xcc3333 });
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.55, 1.0, 5, 10), mat);
  body.position.y = 1.0;
  body.castShadow = true;
  enemy.add(body);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 12), new THREE.MeshStandardMaterial({ color: 0xbbbb44 }));
  head.position.y = 1.9;
  enemy.add(head);

  enemy.userData = {
    hp: 2 + Math.floor(wave/2),
    speed: 2.4 + wave*0.15,
    attackCD: 0,
    body
  };
  scene.add(enemy);
  enemies.push(enemy);
}

// ---------- Shooting ----------
function reload() {
  if (reloading || ammo >= magSize || reserves <= 0) return;
  reloading = true;
  reloadTimer = 1.2;
  showToast('Reloading...');
}

function shoot() {
  if (reloading || ammo <= 0) {
    if (ammo <= 0 && !reloading) reload();
    return;
  }
  const now = performance.now()/1000;
  if (now - lastShot < fireRate) return;
  lastShot = now;
  ammo--;
  updateHUD();

  // Bullet from muzzle (playerHand world)
  const origin = new THREE.Vector3();
  // Approximate muzzle world position
  const muzzleLocal = new THREE.Vector3(0.45, 1.2, 1.2);
  origin.copy(muzzleLocal).applyMatrix4(player.matrixWorld);

  const dir = getAimDirection();

  const bullet = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffee44 })
  );
  bullet.position.copy(origin);
  bullet.userData = { dir, life: 2.0, speed: 60, damage: 1 };
  scene.add(bullet);
  bullets.push(bullet);

  // Muzzle flash
  muzzleFlash.intensity = 4;
  const fm = playerHand.getObjectByName('flashMesh');
  fm.material.opacity = 0.9;
  muzzleTimer = 0.05;
}

function getAimDirection() {
  // Direction from camera to crosshair (center)
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  return dir.normalize();
}

// ---------- Camera ----------
function updateCamera(dt) {
  const distance = 6;
  const height = 2.2;
  const targetPos = new THREE.Vector3(player.position.x, player.position.y + height, player.position.z);
  // Camera offset behind player based on yaw + pitch
  const offset = new THREE.Vector3(
    Math.sin(yaw) * Math.cos(pitch) * distance,
    -Math.sin(pitch) * distance + 0.2,
    Math.cos(yaw) * Math.cos(pitch) * distance
  );
  const camPos = targetPos.clone().add(offset);
  // Collision: keep camera above ground
  camPos.y = Math.max(1.0, camPos.y);
  camera.position.lerp(camPos, 1 - Math.pow(0.001, dt));
  camera.lookAt(targetPos.x, targetPos.y + 0.2, targetPos.z);
}

// ---------- Movement ----------
function updatePlayer(dt) {
  // Orientation: face camera yaw direction
  const camYaw = yaw;
  // Movement relative to camera forward (yaw)
  const forward = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
  const right = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
  const move = new THREE.Vector3();
  if (keys['KeyW']) move.add(forward);
  if (keys['KeyS']) move.sub(forward);
  if (keys['KeyD']) move.add(right);
  if (keys['KeyA']) move.sub(right);
  if (move.lengthSq() > 0) move.normalize();

  const sprinting = (keys['ShiftLeft'] || keys['ShiftRight']) && move.lengthSq() > 0;
  const speed = sprinting ? SPRINT_SPEED : PLAYER_SPEED;

  // Horizontal velocity directly (snappy controls)
  playerVelocity.x = move.x * speed;
  playerVelocity.z = move.z * speed;

  // Jump & gravity
  if (keys['Space'] && playerOnGround) {
    playerVelocity.y = JUMP_V;
    playerOnGround = false;
  }
  playerVelocity.y -= GRAVITY * dt;

  // Move with simple collision against obstacles and walls
  const nextPos = player.position.clone();
  nextPos.x += playerVelocity.x * dt;
  if (!collides(nextPos.x, nextPos.z, 0.6)) {
    player.position.x = nextPos.x;
  } else {
    playerVelocity.x = 0;
  }
  let nextZ = player.position.z + playerVelocity.z * dt;
  if (!collides(player.position.x, nextZ, 0.6)) {
    player.position.z = nextZ;
  } else {
    playerVelocity.z = 0;
  }
  player.position.y += playerVelocity.y * dt;
  if (player.position.y <= 0) {
    player.position.y = 0;
    playerVelocity.y = 0;
    playerOnGround = true;
  }

  // Clamp to arena
  const lim = 68;
  player.position.x = Math.max(-lim, Math.min(lim, player.position.x));
  player.position.z = Math.max(-lim, Math.min(lim, player.position.z));

  // Rotate player to face aim direction (yaw)
  // Body faces movement/camera forward
  const targetAngle = camYaw; // face where camera looks
  player.rotation.y = targetAngle + Math.PI;

  // Gun recoil-ish bob
  if (mouse.down && gameState === 'playing') shoot();
}

function collides(x, z, r) {
  // Check obstacles
  for (const obj of scene.children) {
    if (!obj.userData || !obj.userData.solid) continue;
    if (!(obj instanceof THREE.Mesh)) continue;
    const box = obj.geometry.boundingBox?.clone();
    if (!box) { obj.geometry.computeBoundingBox(); continue; }
    // Simple AABB XZ check using object position (boxes are centered)
    const half = new THREE.Vector3();
    obj.geometry.boundingBox.getSize(half).multiplyScalar(0.5);
    const cx = obj.position.x, cz = obj.position.z;
    if (Math.abs(x - cx) < half.x + r && Math.abs(z - cz) < half.z + r) {
      return true;
    }
  }
  return false;
}

function collidesWithObstacleBox(point, r) {
  // Same but reuse; placeholder for enemy collision (uses 0.5 box approx)
  return collides(point.x, point.z, r);
}

// ---------- Enemies update ----------
function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const toPlayer = new THREE.Vector3().subVectors(player.position, e.position);
    toPlayer.y = 0;
    const dist = toPlayer.length();
    toPlayer.normalize();

    // Move toward player, avoid obstacles crudely (slide)
    const move = toPlayer.clone().multiplyScalar(e.userData.speed * dt);
    const trialX = e.position.x + move.x;
    const trialZ = e.position.z + move.z;
    if (!collidesWithObstacleMesh(trialX, e.position.z, 0.55)) e.position.x = trialX;
    if (!collidesWithObstacleMesh(e.position.x, trialZ, 0.55)) e.position.z = trialZ;
    e.position.y = 0;

    // Face player
    e.rotation.y = Math.atan2(toPlayer.x, toPlayer.z);

    // Attack
    e.userData.attackCD -= dt;
    if (dist < 2.0 && e.userData.attackCD <= 0) {
      e.userData.attackCD = 1.0;
      health -= 8;
      updateHUD();
      if (health <= 0) gameOver();
    }
  }
}

function collidesWithObstacleMesh(x, z, r) {
  // Reuse collides but this is for enemies (they should path around obstacles）
  return collides(x, z, r);
}

// ---------- Bullets ----------
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.position.addScaledVector(b.userData.dir, b.userData.speed * dt);
    b.userData.life -= dt;
    let hit = false;
    // Check enemy hits
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const dx = b.position.x - e.position.x;
      const dz = b.position.z - e.position.z;
      const dy = b.position.y - (e.position.y + 1.0);
      if (dx*dx + dz*dz < 0.6 && Math.abs(dy) < 1.4) {
        e.userData.hp -= b.userData.damage;
        spawnHitParticles(b.position);
        hit = true;
        if (e.userData.hp <= 0) {
          scene.remove(e);
          enemies.splice(j, 1);
          score += 10;
          updateHUD();
          // random pickup
          if (Math.random() < 0.2) spawnPickup(e.position);
        }
        break;
      }
    }
    if (hit || b.userData.life <= 0 || b.position.y < 0) {
      scene.remove(b);
      bullets.splice(i, 1);
    }
  }
}

function spawnHitParticles(pos) {
  for (let i = 0; i < 6; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xff5544 })
    );
    m.position.copy(pos);
    m.userData = {
      vel: new THREE.Vector3((Math.random()-0.5)*4, Math.random()*4, (Math.random()-0.5)*4),
      life: 0.6
    };
    scene.add(m);
    particles.push(m);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.position.addScaledVector(p.userData.vel, dt);
    p.userData.vel.y -= 10 * dt;
    p.userData.life -= dt;
    if (p.userData.life <= 0) {
      scene.remove(p);
      particles.splice(i, 1);
    }
  }
}

// ---------- Pickups ----------
function spawnPickup(pos) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.4, 0.4),
    new THREE.MeshStandardMaterial({ color: 0xffcc22, emissive: 0x553300 })
  );
  m.position.set(pos.x, 0.6, pos.z);
  m.userData = { type: Math.random() < 0.5 ? 'ammo' : 'health', spin: 0 };
  scene.add(m);
  pickups.push(m);
}

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.rotation.y += dt * 2;
    p.position.y = 0.6 + Math.sin(performance.now()/300) * 0.15;
    const dx = p.position.x - player.position.x;
    const dz = p.position.z - player.position.z;
    if (dx*dx + dz*dz < 2.0) {
      if (p.userData.type === 'ammo') { reserves += 18; showToast('Picked up ammo'); }
      else { health = Math.min(maxHealth, health + 30); showToast('Picked up medkit'); }
      scene.remove(p);
      pickups.splice(i, 1);
      updateHUD();
    }
  }
}

// ---------- HUD ----------
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('wave').textContent = wave;
  document.getElementById('ammo').textContent = ammo;
  document.getElementById('reserves').textContent = reserves;
  document.getElementById('healthfill').style.width = Math.max(0, health/maxHealth*100) + '%';
}

function gameOver() {
  gameState = 'dead';
  document.exitPointerLock();
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `<h1>You Died</h1><p>Score: ${score} · Reached Wave ${wave}</p><button id="startBtn">Try Again</button>`;
  overlay.classList.remove('hidden');
  document.getElementById('startBtn').addEventListener('click', restart);
}

function restart() {
  // Reset everything
  for (const e of enemies) scene.remove(e);
  enemies = [];
  for (const b of bullets) scene.remove(b);
  bullets = [];
  for (const p of particles) scene.remove(p);
  particles = [];
  for (const p of pickups) scene.remove(p);
  pickups = [];
  score = 0; wave = 1; health = maxHealth;
  ammo = magSize; reserves = 48; reloading = false;
  player.position.set(0,0,0);
  playerVelocity.set(0,0,0);
  yaw = 0; pitch = -0.15;
  updateHUD();
  document.getElementById('overlay').classList.add('hidden');
  renderer.domElement.requestPointerLock();
  gameState = 'playing';
  startWave();
}

// ---------- Loop ----------
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());

  if (gameState === 'playing') {
    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateParticles(dt);
    updatePickups(dt);

    // Muzzle flash decay
    if (muzzleTimer > 0) {
      muzzleTimer -= dt;
      if (muzzleTimer <= 0) {
        muzzleFlash.intensity = 0;
        const fm = playerHand.getObjectByName('flashMesh');
        fm.material.opacity = 0;
      }
    }

    // Reload
    if (reloading) {
      reloadTimer -= dt;
      if (reloadTimer <= 0) {
        const need = magSize - ammo;
        const take = Math.min(need, reserves);
        ammo += take; reserves -= take;
        reloading = false;
        updateHUD();
      }
    }

    // Wave spawn
    if (!betweenWaves) {
      if (enemiesToSpawn > 0) {
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnEnemy();
          enemiesToSpawn--;
          spawnTimer = 0.9;
        }
      } else if (enemies.length === 0) {
        endWave();
      }
    } else {
      waveBreakTimer -= dt;
      if (waveBreakTimer <= 0) {
        wave++;
        startWave();
      }
    }
  }

  updateCamera(dt);
  renderer.render(scene, camera);
}

init();
updateHUD();
</script>
</body>
</html>
